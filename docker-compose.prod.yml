services:
  client:
    build: 
      context: ./client
      dockerfile: dockerfile.client
      target: production
    ports:
      - "80:80"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
  
  server:
    build: 
      context: ./server
      dockerfile: dockerfile.server
      target: production
    env_file:
      - ./server/.env
