services:
  client:
    build: 
      context: ./client
      dockerfile: dockerfile.client
      target: development
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
  
  server:
    build: 
      context: ./server
      dockerfile: dockerfile.server
      target: development
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
